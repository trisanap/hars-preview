<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Masuk · HARS — LPH UIN Syarif Hidayatullah Jakarta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --blue:        #0a6fc0;
    --blue-700:    #075aa0;
    --blue-800:    #054278;
    --blue-300:    #6fb0e0;
    --blue-100:    #cfe5f5;
    --blue-50:     #eaf3fb;
    --ink:         #14202b;
    --ink-2:       #3a4a5a;
    --muted:       #7588a0;
    --line:        #d9e2ec;
    --line-soft:   #ecf1f6;
    --paper:       #f6f8fb;
    --paper-2:     #fafbfd;
    --danger:      #c33e3e;
    --shadow-sm:   0 1px 2px rgba(20,32,43,0.05);
    --shadow:      0 4px 18px rgba(20,32,43,0.07);
    --shadow-xl:   0 30px 80px -20px rgba(10,66,120,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
    min-height: 100%;
  }
  #root { min-height: 100vh; }

  /* ============= PAGE LAYOUT ============= */
  .page {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    min-height: 100vh;
  }

  /* ----- LEFT: brand panel ----- */
  .brand-panel {
    position: relative;
    background:
      linear-gradient(135deg, var(--blue-700) 0%, var(--blue-800) 100%);
    color: #fff;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: -1px -1px;
    mask-image: radial-gradient(ellipse 80% 70% at 30% 30%, #000 35%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 30% 30%, #000 35%, transparent 80%);
    pointer-events: none;
  }
  /* corner geometric echoing UIN banner */
  .brand-panel .corner {
    position: absolute;
    top: 0;
    right: 0;
    width: 440px;
    height: 320px;
    opacity: 0.55;
    pointer-events: none;
  }
  .brand-panel .corner svg { width: 100%; height: 100%; }

  .brand-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-row .logo {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #fff;
    padding: 5px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }
  .brand-row .logo img { width: 100%; height: 100%; display: block; object-fit: contain; }
  .brand-row .name b {
    display: block;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .brand-row .name span {
    display: block;
    font-size: 12px;
    margin-top: 4px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .brand-body {
    position: relative;
    z-index: 2;
    margin: auto 0;
  }
  .brand-body .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 22px;
  }
  .brand-body .eyebrow .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6df0a8;
    box-shadow: 0 0 0 3px rgba(109,240,168,0.25);
  }
  .brand-body h1 {
    font-size: clamp(34px, 3.4vw, 46px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    max-width: 480px;
    text-wrap: balance;
  }
  .brand-body p {
    font-size: 15.5px;
    line-height: 1.6;
    color: rgba(255,255,255,0.85);
    max-width: 420px;
    margin: 0 0 32px;
  }
  .brand-body .features {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 440px;
  }
  .brand-body .features .item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    color: rgba(255,255,255,0.92);
  }
  .brand-body .features .item .ico {
    flex: 0 0 28px;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.14);
    display: grid;
    place-items: center;
    border: 1px solid rgba(255,255,255,0.18);
  }
  .brand-body .features .item .ico svg { width: 14px; height: 14px; }

  .brand-foot {
    position: relative;
    z-index: 2;
    margin-top: auto;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: rgba(255,255,255,0.55);
  }
  .brand-foot a { color: rgba(255,255,255,0.75); text-decoration: none; }
  .brand-foot a:hover { color: #fff; }

  /* ----- RIGHT: form panel ----- */
  .form-panel {
    background: #fff;
    display: flex;
    flex-direction: column;
    padding: 32px 48px;
    position: relative;
  }
  .form-top {
    display: flex;
    justify-content: flex-end;
    font-size: 13.5px;
    color: var(--muted);
  }
  .form-top a {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
    margin-left: 6px;
  }
  .form-top a:hover { text-decoration: underline; }

  .form-card-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .form-card {
    width: 100%;
    max-width: 420px;
  }
  .form-card .title {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
    line-height: 1.1;
  }
  .form-card .subtitle {
    font-size: 15px;
    color: var(--ink-2);
    margin: 0 0 28px;
    line-height: 1.55;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: 0.005em;
  }
  .field label a {
    font-size: 12.5px;
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
  }
  .field label a:hover { text-decoration: underline; }

  .input-wrap {
    position: relative;
  }
  .input-wrap .icon-left {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted);
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--paper-2);
    outline: none;
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .input-wrap input::placeholder { color: #98a6b8; }
  .input-wrap input:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(10,111,192,0.12);
  }
  .input-wrap .reveal {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    display: grid;
    place-items: center;
  }
  .input-wrap .reveal:hover { background: var(--paper); color: var(--ink); }
  .input-wrap .reveal svg { width: 16px; height: 16px; }

  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0 20px;
  }
  .check {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    color: var(--ink-2);
    cursor: pointer;
    user-select: none;
  }
  .check input { position: absolute; opacity: 0; pointer-events: none; }
  .check .box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line);
    border-radius: 5px;
    background: #fff;
    display: grid;
    place-items: center;
    transition: all .15s ease;
  }
  .check input:checked + .box {
    background: var(--blue);
    border-color: var(--blue);
  }
  .check .box svg {
    width: 12px; height: 12px;
    color: #fff;
    opacity: 0;
    transition: opacity .15s ease;
  }
  .check input:checked + .box svg { opacity: 1; }

  .submit-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(10,111,192,0.28);
    transition: all .15s ease;
  }
  .submit-btn:hover {
    background: var(--blue-700);
    box-shadow: 0 6px 18px rgba(10,111,192,0.38);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.7; cursor: progress; }
  .submit-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #fdecec;
    border: 1px solid #f5c0c0;
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .error svg { width: 16px; height: 16px; flex: 0 0 16px; margin-top: 2px; }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .help-note {
    text-align: center;
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.6;
  }
  .help-note a { color: var(--blue); font-weight: 600; text-decoration: none; }
  .help-note a:hover { text-decoration: underline; }

  .form-bottom {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding-top: 16px;
  }

  /* ----- responsive ----- */
  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; }
    .brand-panel { padding: 28px 28px 36px; min-height: 280px; }
    .brand-panel .corner { width: 260px; height: 200px; }
    .brand-body { margin: 24px 0 0; }
    .brand-body h1 { font-size: 28px; }
    .brand-body .features { display: none; }
    .brand-foot { padding-top: 22px; }
    .form-panel { padding: 28px 24px 32px; }
    .form-card { max-width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function ShieldIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <path d="m9 12 2 2 4-4"/>
    </svg>
  );
}
function SparkIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  );
}
function CameraIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  );
}
function UserIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  );
}
function LockIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  );
}
function EyeIcon({ open }) {
  return open ? (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  ) : (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a19.78 19.78 0 0 1 4.22-5.94"/>
      <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a19.86 19.86 0 0 1-3.17 4.19"/>
      <path d="m1 1 22 22"/>
      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
    </svg>
  );
}
function CheckIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  );
}
function AlertIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  );
}
function ArrowRight() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{width:14, height:14}}>
      <path d="M5 12h14"/>
      <path d="m13 5 7 7-7 7"/>
    </svg>
  );
}

function Login() {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [show, setShow] = useState(false);
  const [remember, setRemember] = useState(true);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const onSubmit = (e) => {
    e.preventDefault();
    setError('');
    if (!username || !password) {
      setError('Mohon isi username dan password.');
      return;
    }
    setLoading(true);
    // simulate auth — replace with real call
    setTimeout(() => {
      setLoading(false);
      // demo: show success state via console
      console.log('Login attempt:', { username, remember });
    }, 900);
  };

  return (
    <div className="page">
      {/* LEFT — brand panel */}
      <aside className="brand-panel">
        <div className="corner" aria-hidden="true">
          <svg viewBox="0 0 440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="440,0 440,320 80,0" fill="#ffffff" opacity="0.06"/>
            <polygon points="440,0 440,320 180,0" fill="#ffffff" opacity="0.1"/>
            <polygon points="440,70 440,320 260,320 440,70" fill="#ffffff" opacity="0.07"/>
            <polygon points="440,150 440,320 340,320" fill="#ffffff" opacity="0.14"/>
          </svg>
        </div>

        <div className="brand-row">
          <div className="logo">
            <img src="assets/uin-logo.png" alt="UIN Syarif Hidayatullah Jakarta"/>
          </div>
          <div className="name">
            <b>HARS</b>
            <span>LPH UIN Syarif Hidayatullah Jakarta</span>
          </div>
        </div>

        <div className="brand-body">
          <div className="eyebrow">
            <span className="dot"></span>
            Halal Audit Reporting System · v1.0
          </div>
          <h1>Selamat datang kembali, auditor.</h1>
          <p>Masuk untuk membuka workspace audit halal Anda — semua registrasi, dokumen, dan laporan ada di sini.</p>

          <div className="features">
            <div className="item">
              <div className="ico"><ShieldIcon/></div>
              <div><b>Workspace audit</b> — daftar registrasi, jadwal, dan tim auditor di satu tempat.</div>
            </div>
            <div className="item">
              <div className="ico"><SparkIcon/></div>
              <div><b>AI assisted</b> — bantu menyusun dokumen pre-audit dan mencatat temuan.</div>
            </div>
            <div className="item">
              <div className="ico"><CameraIcon/></div>
              <div><b>OCR halal ID</b> — foto kemasan, sistem ekstrak ID, BPJPH isi nama produk.</div>
            </div>
          </div>
        </div>

        <div className="brand-foot">
          <span>© 2026 LPH UIN Syarif Hidayatullah Jakarta</span>
          <span><a href="#">Butuh bantuan?</a></span>
        </div>
      </aside>

      {/* RIGHT — form panel */}
      <main className="form-panel">
        <div className="form-top">
          Belum punya akun?
          <a href="mailto:lph@uinjkt.ac.id">Hubungi admin LPH</a>
        </div>

        <div className="form-card-wrap">
          <div className="form-card">
            <h2 className="title">Masuk ke HARS</h2>
            <p className="subtitle">Gunakan akun Auditor atau Admin LPH Anda untuk melanjutkan ke workspace.</p>

            {error && (
              <div className="error" role="alert">
                <AlertIcon/>
                <span>{error}</span>
              </div>
            )}

            <form onSubmit={onSubmit} noValidate>
              <div className="field">
                <label htmlFor="u">Username</label>
                <div className="input-wrap">
                  <span className="icon-left"><UserIcon/></span>
                  <input
                    id="u"
                    type="text"
                    autoComplete="username"
                    placeholder="Masukkan username"
                    value={username}
                    onChange={(e) => setUsername(e.target.value)}
                    autoFocus
                  />
                </div>
              </div>

              <div className="field">
                <label htmlFor="p">
                  Password
                  <a href="#" tabIndex={-1}>Lupa password?</a>
                </label>
                <div className="input-wrap">
                  <span className="icon-left"><LockIcon/></span>
                  <input
                    id="p"
                    type={show ? 'text' : 'password'}
                    autoComplete="current-password"
                    placeholder="Masukkan password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                  />
                  <button
                    type="button"
                    className="reveal"
                    onClick={() => setShow(s => !s)}
                    aria-label={show ? 'Sembunyikan password' : 'Tampilkan password'}
                  >
                    <EyeIcon open={show}/>
                  </button>
                </div>
              </div>

              <div className="row-between">
                <label className="check">
                  <input
                    type="checkbox"
                    checked={remember}
                    onChange={(e) => setRemember(e.target.checked)}
                  />
                  <span className="box"><CheckIcon/></span>
                  Ingat saya di perangkat ini
                </label>
              </div>

              <button type="submit" className="submit-btn" disabled={loading}>
                {loading ? (
                  <>
                    <span className="spinner"></span>
                    Memverifikasi...
                  </>
                ) : (
                  <>
                    Masuk
                    <ArrowRight/>
                  </>
                )}
              </button>
            </form>

            <div className="divider">ATAU</div>

            <div className="help-note">
              Kesulitan masuk? <a href="mailto:lph@uinjkt.ac.id">Hubungi admin LPH</a> untuk reset password.
            </div>
          </div>
        </div>

        <div className="form-bottom">
          Akses internal LPH UIN Syarif Hidayatullah Jakarta · halalaudit.id
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Login/>);
</script>
</body>
</html>
